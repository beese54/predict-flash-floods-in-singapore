# Singapore Flash Flood Prediction — Project Configuration

# Geographic scope
singapore:
  lat_min: 1.15
  lat_max: 1.48
  lon_min: 103.60
  lon_max: 104.05
  grid_resolution_km: 1.0

# Data date range
data:
  start_date: "2016-12-01"   # NEA rainfall data start
  end_date: "2026-02-28"

# LLM extraction
llm:
  provider: "openai"            # Switch to "anthropic" to use Anthropic API
  openai_model: "gpt-4o-mini"
  anthropic_model: "claude-haiku-4-5-20251001"
  max_retries: 3
  temperature: 0.0

# Label generation
labels:
  flood_radius_km: 1.0          # Radius around geocoded flood point to mark as flooded
  time_window_hours: 3          # ±N hours around event to mark as flood=1
  prediction_horizon_hours: 6   # Predict flood within next N hours

# Feature engineering
features:
  idw_search_radius_km: 10      # Max distance to search for rain stations in IDW
  idw_min_stations: 2           # Min stations required for IDW; fallback to island mean
  rolling_windows_hours: [0.5, 1, 3, 6, 12, 24]

# NEA API
nea:
  api_endpoint: "https://api-open.data.gov.sg/v2/real-time/api/rainfall"
  request_delay_seconds: 1.0

# ML model
model:
  train_end_date: "2022-12-31"
  val_end_date: "2023-12-31"
  # test: 2024-01-01 to end_date

# Streamlit
app:
  host: "localhost"
  port: 8501
